name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this feature? What problem does it solve?
    validations:
      required: true

  - type: input
    id: api-endpoint
    attributes:
      label: Meta Graph API Endpoint
      description: If this maps to a specific Graph API endpoint, which one?
      placeholder: e.g. /act_{ad_account_id}/campaigns
    validations:
      required: false
